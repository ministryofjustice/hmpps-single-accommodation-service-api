generic-service:
  serviceAccountName: hmpps-community-accommodation-api-service-account
  replicaCount: 2

  ingress:
    host: single-accommodation-service-api-preprod.hmpps.service.justice.gov.uk
    tlsSecretName: hmpps-single-accommodation-service-api-preprod-cert

  env:
    SENTRY_ENVIRONMENT: preprod
    JAVA_OPTS: "-Xmx2000m"
    SPRING_PROFILES_ACTIVE: preprod
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: "applicationinsights.nonprod.json"
    HMPPS_SQS_ENABLED: true
    HMPPS_AUTH_URL: "https://sign-in-preprod.hmpps.service.justice.gov.uk/auth"
    SERVICE_SAS-AND-DELIUS_BASE-URL: https://single-accommodation-and-delius-preprod.hmpps.service.justice.gov.uk
    SERVICE_APPROVED-PREMISES-AND-DELIUS_BASE-URL: https://approved-premises-and-delius-preprod.hmpps.service.justice.gov.uk
    SERVICE_APPROVED-PREMISES-API_BASE-URL: https://approved-premises-api-preprod.hmpps.service.justice.gov.uk
    SERVICE_APPROVED-PREMISES-UI_BASE-URL: https://approved-premises-preprod.hmpps.service.justice.gov.uk
    SERVICE_TEMPORARY-ACCOMMODATION-UI_BASE-URL: https://transitional-accommodation-preprod.hmpps.service.justice.gov.uk
    SERVICE_COMMISSIONED-REHABILITATIVE-SERVICES-UI_BASE-URL: https://find-and-refer-intervention-preprod.hmpps.service.justice.gov.uk
    SERVICE_CORE-PERSON-RECORD_BASE-URL: https://hmpps-person-record-preprod.hmpps.service.justice.gov.uk
    SERVICE_PRISONER-SEARCH_BASE-URL: https://prisoner-search-preprod.prison.service.justice.gov.uk
    SERVICE_COMMISSIONED-REHABILITATIVE-SERVICES-API_BASE-URL: https://hmpps-interventions-service-preprod.apps.live-1.cloud-platform.service.justice.gov.uk
    SERVICE_TIER_BASE-URL: https://hmpps-tier-preprod.hmpps.service.justice.gov.uk
    SERVICE_ACCOMMODATION-DATA-DOMAIN_BASE-URL: https://accommodation-data-domain-api-preprod.hmpps.service.justice.gov.uk
    SERVICE_NOMIS-USER-ROLES_BASE-URL: https://nomis-user-roles-api-preprod.prison.service.justice.gov.uk
    EVENT_DETAILS-URL_PROPOSED-ACCOMMODATION-UPDATED: https://single-accommodation-service-api-preprod.hmpps.service.justice.gov.uk/accommodations/#id
    EVENT_DETAILS-URL_DUTY-TO-REFER-UPDATED: https://single-accommodation-service-api-preprod.hmpps.service.justice.gov.uk/duty-to-refers/#id

    SPRINGDOC_API_DOCS_ENABLED: false
    SPRINGDOC_SWAGGER_UI_ENABLED: false

    SCHEDULING_ENABLED: true

# CloudPlatform AlertManager receiver to route prometheus alerts to slack
# See https://user-guide.cloud-platform.service.justice.gov.uk/documentation/monitoring-an-app/how-to-create-alarms.html#creating-your-own-custom-alerts
generic-prometheus-alerts:
  alertSeverity: hmpps-approved-premises-nonprod
