info.app:
  name: HMPPS Single Accommodation Service Api
  version: 1.0
spring:
  threads:
    virtual:
      enabled: true
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV4
  config:
    import: classpath:application-infrastructure.yml
  application:
    name: hmpps-single-accommodation-service-api
  jackson:
    date-format: "yyyy-MM-dd HH:mm:ss"
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${hmpps-auth.url}/.well-known/jwks.json
  http:
    codecs:
      max-in-memory-size: 10MB
  web:
    error:
      include-message: always
springdoc:
  paths-to-exclude: "/queue-admin/**"
sentry:
  send-default-pii: false
server:
  port: 8080
  servlet:
    context-path: /
  forward-headers-strategy: native
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
      internal-proxies: 10\.\d{1,3}\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}|169\.254\.\d{1,3}\.\d{1,3}|127\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.1[6-9]{1}\.\d{1,3}\.\d{1,3}|172\.2[0-9]{1}\.\d{1,3}\.\d{1,3}|172\.3[0-1]{1}\.\d{1,3}\.\d{1,3}|0:0:0:0:0:0:0:1|::1|100\.6[4-9]\.\d{1,3}\.\d{1,3}|100\.[7-9][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.1[0-1][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.12[0-7]\.\d{1,3}\.\d{1,3}
  shutdown: graceful

management:
  health:
    db:
      enabled: true
  endpoints:
    web:
      base-path: /
      exposure:
        include: 'info, health'
  endpoint:
    health:
      cache:
        time-to-live: 2000ms
      show-components: always
      show-details: always
      probes:
        enabled: true
    info:
      cache:
        time-to-live: 2000ms

javers:
  springDataAuditableRepositoryAspectEnabled: true

hmpps:
  sqs:
    dispatcher:
      max-events-per-batch: 10
      max-concurrent-events: 4
  sar:
    template:
      path: /sar/template_hmpps-single-accommodation-service-api.mustache
      enabled: true

case-list:
  page-size: 200
  onboarded-teams: []

scheduling:
  enabled: true
  fixed-delay: 2s

shedlock:
  default-lock-at-most-for: PT2M
  outbox-event-publisher:
    lock-at-most-for: PT2M
    lock-at-least-for: PT1S
  inbox-event-dispatcher:
    lock-at-most-for: PT2M
    lock-at-least-for: PT1S
