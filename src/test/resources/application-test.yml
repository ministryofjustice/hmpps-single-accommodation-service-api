server:
  shutdown: immediate

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

wiremock:
  service-names:
    - sas-and-delius
    - approved-premises-and-delius
    - approved-premises-and-oasys
    - approved-premises-api
    - core-person-record
    - commissioned-rehabilitative-services-api
    - tier
    - accommodation-data-domain
    - nomis-user-roles
    - prisoner-search

service:
  sas-and-delius:
    read-timeout: 300ms
  approved-premises-and-delius:
    read-timeout: 300ms
  approved-premises-and-oasys:
    read-timeout: 300ms
  approved-premises-api:
    read-timeout: 300ms
  core-person-record:
    read-timeout: 300ms
  commissioned-rehabilitative-services-api:
    read-timeout: 300ms
  tier:
    read-timeout: 300ms
  accommodation-data-domain:
    read-timeout: 300ms
  nomis-user-roles:
    read-timeout: 300ms
  prisoner-search:
    read-timeout: 300ms
  approved-premises-ui:
    base-url: approved-premises-ui-test-url
  temporary-accommodation-ui:
    base-url: temporary-accommodation-ui-test-url
  commissioned-rehabilitative-services-ui:
    base-url: commissioned-rehabilitative-services-ui-test-url

spring:
  cache:
    type: none
  datasource:
    url: jdbc:postgresql://localhost:5432/sas_db
    username: sas_user
    password: sas_psw
    hikari:
      maximum-pool-size: 10

scheduling:
  enabled: false
  fixed-delay: 100ms


event:
  details-url:
    proposed-accommodation-updated: http://api-host/proposed-accommodations/#id
    duty-to-refer-updated: http://api-host/duty-to-refers/#id

hmpps:
  sqs:
    enabled: true
    useWebToken: false
    provider: localstack
    topics:
      hmpps-domain-event-topic:
        arn: arn:aws:sns:eu-west-2:000000000000:hmpps-domain-event-topic
    queues:
      sas-domain-events-queue:
        queueName: sas_domain_events_queue
        dlqName: sas_domain_events_dlq
        subscribeTopicId: hmpps-domain-event-topic
        subscribeFilter: '{"eventType":["tier.calculation.complete", "person.community.manager.allocated"]}'
      test-domain-events-queue:
        dlqName: ${random.uuid}
        queueName: ${random.uuid}
        subscribeTopicId: hmpps-domain-event-topic
  sar:
    template:
      path: /sar/template_hmpps-single-accommodation-service-api.mustache
      enabled: true
    tests:
      attachments-expected: false
      expected-flyway-schema-version: "0034"
      expected-jpa-entity-schema:
        path: /sar/sas-entities-schema.json

test-data-setup:
  user-id: 48785d6e-19f2-49e6-9530-d48423f95e66

case-list:
  page-size: 1
  onboarded-teams: 12345
logging:
  level:
    root: WARN
    uk.gov.justice.digital.hmpps.singleaccommodationserviceapi: INFO
